# Oleada C4: compila el instalador Tauri por OS y sube artefactos (sin firma de código).
name: Desktop (Tauri)

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/desktop-tauri/**'
      - 'apps/web/**'
      - 'packages/vault-crypto/**'
      - 'packages/core/**'
      - '.github/workflows/desktop-tauri.yml'
  pull_request:
    paths:
      - 'apps/desktop-tauri/**'
      - 'apps/web/**'
      - 'packages/vault-crypto/**'
      - 'packages/core/**'
      - '.github/workflows/desktop-tauri.yml'
  workflow_dispatch:

concurrency:
  group: desktop-tauri-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: passtore-desktop-linux
          - os: windows-latest
            artifact: passtore-desktop-windows
          - os: macos-latest
            artifact: passtore-desktop-macos

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop-tauri/package-lock.json
            packages/vault-crypto/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-tauri/src-tauri

      # Web `npm run build` compiles @passtore/vault-crypto to dist/ then tsc + Vite (see apps/web/package.json).
      - name: Install npm dependencies (web + desktop)
        run: |
          npm ci --prefix apps/web
          npm ci --prefix apps/desktop-tauri

      - name: Build Tauri bundle
        working-directory: apps/desktop-tauri
        run: npm run build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop-tauri/src-tauri/target/release/bundle/
          if-no-files-found: error
